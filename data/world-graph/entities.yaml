    summary: The school of chaos magic, the base of every magic on Hereva. Its house is time, gravity, particle physics, and underground forces.
    episode_debut: 1
    page_debut: 1
    layout: { x: -510, y: -340 }
    image_url: null

  - slug: magmah
    name: Magmah
    kind: coven
